# Production - BDE Manager
# Lancement :
#   docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
#
# Tout est piloté par un seul fichier .env.prod (cf. .env.prod.example).
# Les variables NEXT_PUBLIC_* sont injectées au BUILD du front (build args) :
# modifier ces valeurs impose un rebuild (--build) du service web.

# Limites de logs partagées : empêche les journaux Docker de remplir le disque
# Chaque service garde au max 3 fichiers de 10 Mo => 30 Mo de logs / conteneur.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bde_postgres_prod
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bde_redis_prod
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 384m
    logging: *default-logging
    command: >-
      redis-server --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--pass', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: bde_api_prod
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    logging: *default-logging
    environment:
      NODE_ENV: production
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL}
      # URL DB construite à partir des identifiants Postgres + hostname interne
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_TTL: ${REDIS_TTL:-86400}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      GEO_API_URL: ${GEO_API_URL:-https://api-adresse.data.gouv.fr}
      # true = seed automatique au PREMIER démarrage (base vide) uniquement
      RUN_SEED: ${RUN_SEED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - '3001'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Inlinées dans le bundle navigateur au build
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
        NEXT_PUBLIC_MOCK_AUTH: ${NEXT_PUBLIC_MOCK_AUTH:-false}
    container_name: bde_web_prod
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    logging: *default-logging
    environment:
      NODE_ENV: production
      # URL interne container-to-container pour les appels SSR
      API_INTERNAL_URL: http://api:3001/api/v1
      # Rappelées au runtime pour le rendu serveur (SSR)
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
    depends_on:
      - api
    expose:
      - '3000'

  caddy:
    image: caddy:2-alpine
    container_name: bde_caddy_prod
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    logging: *default-logging
    ports:
      - '80:80'
      - '443:443'
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
      CADDY_EMAIL: ${CADDY_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
